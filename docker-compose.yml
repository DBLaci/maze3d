services:
  app:
    build:
      context: .
      target: deps
    command: sh -c "npm install && npm run dev"
    ports:
      - "${HTTP_PORT:-3000}:5173"
    environment:
      PORT: "3000"
      MAZE_COUNT: "${MAZE_COUNT:-3}"
      MAZE_SIZE_X: "${MAZE_SIZE_X:-4}"
      MAZE_SIZE_Y: "${MAZE_SIZE_Y:-4}"
      MAZE_SIZE_Z: "${MAZE_SIZE_Z:-4}"
      CRUMB_LIMIT: "${CRUMB_LIMIT:-10}"
    volumes:
      - .:/app
    restart: unless-stopped
